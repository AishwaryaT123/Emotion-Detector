<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotion Detector</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 700px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            color: #4a4a8a;
            text-align: center;
            margin-bottom: 8px;
            font-size: 2em;
        }

        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 0.95em;
        }

        textarea {
            width: 100%;
            height: 130px;
            padding: 14px;
            border: 2px solid #dde;
            border-radius: 12px;
            font-size: 1em;
            resize: vertical;
            transition: border-color 0.3s;
            outline: none;
        }

        textarea:focus {
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }

        button:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        .result-box {
            margin-top: 28px;
            padding: 20px;
            background: #f8f8ff;
            border-radius: 12px;
            border-left: 5px solid #667eea;
            display: none;
        }

        .result-box h3 {
            color: #4a4a8a;
            margin-bottom: 12px;
        }

        .result-text {
            color: #333;
            line-height: 1.7;
            font-size: 0.97em;
        }

        .emotion-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
            margin-top: 16px;
        }

        .emotion-card {
            background: white;
            border-radius: 10px;
            padding: 12px;
            text-align: center;
            border: 2px solid #eee;
            transition: border-color 0.3s;
        }

        .emotion-card.dominant {
            border-color: #667eea;
            background: linear-gradient(135deg, #f0f0ff, #e8e8ff);
        }

        .emotion-name {
            font-weight: 600;
            color: #555;
            text-transform: capitalize;
            font-size: 0.9em;
        }

        .emotion-score {
            font-size: 1.4em;
            font-weight: bold;
            color: #667eea;
            margin-top: 4px;
        }

        .dominant-badge {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.7em;
            margin-top: 4px;
        }

        .error-box {
            margin-top: 20px;
            padding: 14px 20px;
            background: #fff0f0;
            border-radius: 10px;
            border-left: 5px solid #e74c3c;
            color: #c0392b;
            display: none;
        }

        .loading {
            text-align: center;
            color: #888;
            margin-top: 16px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎭 Emotion Detector</h1>
        <p class="subtitle">Powered by Watson NLP — Detect emotions in any text</p>

        <textarea id="textInput" placeholder="Enter your text here to analyze emotions..."></textarea>
        <button onclick="analyzeEmotion()">Analyze Emotions</button>

        <div class="loading" id="loading">⏳ Analyzing emotions...</div>

        <div class="error-box" id="errorBox">
            ⚠️ <span id="errorMsg">Invalid text! Please try again!</span>
        </div>

        <div class="result-box" id="resultBox">
            <h3>📊 Analysis Result</h3>
            <p class="result-text" id="resultText"></p>
            <div class="emotion-grid" id="emotionGrid"></div>
        </div>
    </div>

    <script>
        async function analyzeEmotion() {
            const text = document.getElementById('textInput').value.trim();
            const resultBox = document.getElementById('resultBox');
            const errorBox = document.getElementById('errorBox');
            const loading = document.getElementById('loading');

            resultBox.style.display = 'none';
            errorBox.style.display = 'none';
            loading.style.display = 'block';

            if (!text) {
                loading.style.display = 'none';
                errorBox.style.display = 'block';
                document.getElementById('errorMsg').textContent = 'Please enter some text to analyze!';
                return;
            }

            try {
                const response = await fetch(`/emotionDetector?textToAnalyze=${encodeURIComponent(text)}`);
                const result = await response.text();
                loading.style.display = 'none';

                if (result.startsWith('Invalid')) {
                    errorBox.style.display = 'block';
                    document.getElementById('errorMsg').textContent = result;
                    return;
                }

                document.getElementById('resultText').textContent = result;

                // Parse and display emotion cards
                const emotions = ['anger', 'disgust', 'fear', 'joy', 'sadness'];
                const dominantMatch = result.match(/dominant emotion is (\w+)/);
                const dominant = dominantMatch ? dominantMatch[1] : '';

                const grid = document.getElementById('emotionGrid');
                grid.innerHTML = '';

                emotions.forEach(emotion => {
                    const match = result.match(new RegExp(`'${emotion}': ([0-9.]+)`));
                    const score = match ? parseFloat(match[1]).toFixed(3) : 'N/A';
                    const isDominant = emotion === dominant;

                    const card = document.createElement('div');
                    card.className = `emotion-card${isDominant ? ' dominant' : ''}`;
                    card.innerHTML = `
                        <div class="emotion-name">${getEmoji(emotion)} ${emotion}</div>
                        <div class="emotion-score">${score}</div>
                        ${isDominant ? '<span class="dominant-badge">Dominant</span>' : ''}
                    `;
                    grid.appendChild(card);
                });

                resultBox.style.display = 'block';
            } catch (err) {
                loading.style.display = 'none';
                errorBox.style.display = 'block';
                document.getElementById('errorMsg').textContent = 'An error occurred. Please try again.';
            }
        }

        function getEmoji(emotion) {
            const emojis = { anger: '😠', disgust: '🤢', fear: '😨', joy: '😊', sadness: '😢' };
            return emojis[emotion] || '🎭';
        }

        document.getElementById('textInput').addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') analyzeEmotion();
        });
    </script>
</body>
</html>
